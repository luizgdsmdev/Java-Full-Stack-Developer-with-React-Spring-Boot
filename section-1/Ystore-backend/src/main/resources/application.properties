spring.application.name=Ystore

logging.pattern.console=%green(%d{HH:mm:ss}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.url=jdbc:mysql://localhost:3307/ystoredb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

spring.sql.init.schema-locations=optional:classpath:sql/schema.sql
spring.sql.init.data-locations=optional:classpath:sql/data.sql
spring.jpa.defer-datasource-initialization=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Server configuration for mobile access
server.address=0.0.0.0
server.port=8080

# Active profile for local development
spring.profiles.active=local

# CORS Configuration
# Configure your local origins in application-local.properties
# Example: cors.allowed-origins=http://localhost:5173,http://your.ip.0.0:5173
cors.allowed-origins=http://localhost:5173